<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle with hand-drawn feel -->
  <circle cx="50" cy="50" r="45" fill="#FDF8F3" stroke="#2B2B2B" stroke-width="3" style="stroke-linecap: round;"/>
  
  <!-- Brain left side (organic) -->
  <path d="M35 35 Q25 40 28 50 Q25 60 35 65" fill="none" stroke="#FF6B6B" stroke-width="4" stroke-linecap="round"/>
  <path d="M35 35 Q40 30 45 35" fill="none" stroke="#FF6B6B" stroke-width="3" stroke-linecap="round"/>
  <path d="M30 45 Q35 42 38 45" fill="none" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round"/>
  <path d="M30 55 Q35 52 38 55" fill="none" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Brain right side (circuit/machine) -->
  <path d="M65 35 Q75 40 72 50 Q75 60 65 65" fill="none" stroke="#4ECDC4" stroke-width="4" stroke-linecap="round"/>
  <circle cx="65" cy="40" r="3" fill="#4ECDC4"/>
  <circle cx="70" cy="50" r="3" fill="#4ECDC4"/>
  <circle cx="65" cy="60" r="3" fill="#4ECDC4"/>
  <line x1="65" y1="43" x2="70" y2="47" stroke="#4ECDC4" stroke-width="2"/>
  <line x1="70" y1="53" x2="65" y2="57" stroke="#4ECDC4" stroke-width="2"/>
  
  <!-- Connection between halves -->
  <line x1="45" y1="50" x2="55" y2="50" stroke="#2B2B2B" stroke-width="2" stroke-dasharray="4,2"/>
</svg>